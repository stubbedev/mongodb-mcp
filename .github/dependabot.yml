version: 2
updates:
  # Go module dependencies.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    target-branch: master
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
    groups:
      go-dependencies:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: master
    open-pull-requests-limit: 10
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"
