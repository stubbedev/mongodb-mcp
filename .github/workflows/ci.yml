name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - name: Config schema is up to date
        run: |
          go run ./cmd/gen-schema
          git diff --exit-code config.schema.json \
            || (echo "::error::config.schema.json is stale — run 'go run ./cmd/gen-schema'"; exit 1)

  integration:
    name: integration (docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Integration tests
        run: go test -tags=integration ./...

  nix:
    name: nix build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Build
        run: nix build --print-build-logs
      - name: Flake check
        run: nix flake check --print-build-logs
