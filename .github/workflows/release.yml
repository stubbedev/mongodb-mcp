name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="${GITHUB_REF_NAME#v}"
          out="mongodb-mcp"
          [ "$GOOS" = "windows" ] && out="mongodb-mcp.exe"
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.version=${version}" -o "dist/${out}" ./cmd/mongodb-mcp
          base="mongodb-mcp_${GITHUB_REF_NAME}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip "${base}.zip" "${out}")
            echo "ASSET=dist/${base}.zip" >> "$GITHUB_ENV"
          else
            (cd dist && tar -czf "${base}.tar.gz" "${out}")
            echo "ASSET=dist/${base}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
